<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Sidekick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    header { margin-bottom: 40px; }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    header p { margin-top: 6px; font-size: 14px; color: #666; }

    .card {
      background: #fff;
      border: 1px solid #e2e2e0;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }

    input[type="password"], textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafaf8;
      resize: vertical;
      transition: border-color 0.15s;
      outline: none;
    }

    input[type="password"]:focus, textarea:focus { border-color: #888; background: #fff; }

.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 620px) { .cols { grid-template-columns: 1fr; } }

    .col-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin-bottom: 8px;
    }

    textarea { min-height: 180px; line-height: 1.6; }

    #output {
      min-height: 180px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafaf8;
      border: 1px solid #e2e2e0;
      border-radius: 6px;
      padding: 10px 12px;
    }

    #output.empty { color: #bbb; font-style: italic; }
    #output.loading { color: #888; }
    #output.error { color: #c0392b; background: #fdf5f4; border-color: #f0c0bb; }

    button {
      margin-top: 20px;
      padding: 10px 22px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.8; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .light-revision-note {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      font-style: italic;
    }

    .footer {
      margin-top: 12px;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Voice Sidekick</h1>
      <p>Paste copy. Get it back in your brand's voice.</p>
    </header>

    <div class="card">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    </div>

    <div class="card">
      <div class="cols">
        <div>
          <div class="col-label">Your copy</div>
          <textarea id="inputCopy" placeholder="Paste the copy you want refined..."></textarea>
        </div>
        <div>
          <div class="col-label">Refined</div>
          <div id="output" class="empty">Output will appear here.</div>
          <div id="lightRevisionNote" class="light-revision-note" style="display:none">
            Input was already close to brand voice — only minor adjustments made.
          </div>
        </div>
      </div>
      <button id="refineBtn">Refine</button>
    </div>

    <div class="footer">studio north · voice sidekick demo</div>
  </div>

  <script type="module">
    import { SAMPLE_BRAND_PROFILE } from "./src/lib/brandProfile.js";
    import { buildRefinementRequest } from "./src/lib/promptModule.js";

    const profile = SAMPLE_BRAND_PROFILE;

    // --- Refine ---
    const btn = document.getElementById("refineBtn");
    const outputEl = document.getElementById("output");
    const noteEl = document.getElementById("lightRevisionNote");

    btn.addEventListener("click", async () => {
      const apiKey = document.getElementById("apiKey").value.trim();
      const userCopy = document.getElementById("inputCopy").value.trim();

      if (!apiKey) { alert("Enter your Anthropic API key first."); return; }
      if (!userCopy) { alert("Paste some copy to refine."); return; }

      btn.disabled = true;
      outputEl.className = "loading";
      outputEl.textContent = "Refining...";
      noteEl.style.display = "none";

      try {
        const requestBody = buildRefinementRequest(profile.compressedPrompt, userCopy);

        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "anthropic-version": "2023-06-01",
            "x-api-key": apiKey,
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify(requestBody),
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`API ${res.status}: ${err}`);
        }

        const data = await res.json();
        let refined = data.content?.[0]?.text ?? "(no output)";

        const isLight = refined.includes("##LIGHT_REVISION##");
        refined = refined.replace(/\n?##LIGHT_REVISION##\n?/g, "").trim();

        outputEl.className = "";
        outputEl.textContent = refined;
        noteEl.style.display = isLight ? "block" : "none";

      } catch (err) {
        outputEl.className = "error";
        outputEl.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
